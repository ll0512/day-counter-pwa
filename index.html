<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="刘静霖">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>刘静霖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0f0f23 0%, #1a1a3e 40%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 420px;
            width: 90%;
        }
        .name {
            font-size: 42px;
            font-weight: 600;
            letter-spacing: 12px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .growth { font-size: 20px; color: rgba(255,255,255,0.6); margin-bottom: 8px; letter-spacing: 2px; }
        .days {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #64ffda 0%, #00e5ff 50%, #18ffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(100, 255, 218, 0.3);
        }
        .days-unit { font-size: 28px; color: #64ffda; margin-bottom: 45px; letter-spacing: 4px; }
        .date-info { padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); }
        .date-solar { font-size: 18px; color: rgba(255,255,255,0.8); margin-bottom: 10px; letter-spacing: 1px; }
        .date-lunar { font-size: 16px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
        .date-range { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 20px; letter-spacing: 1px; }
        @media (max-width: 400px) {
            .card { padding: 40px 30px; }
            .name { font-size: 32px; letter-spacing: 8px; }
            .days { font-size: 90px; }
            .days-unit { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="name">刘静霖</div>
        <div class="growth">成长</div>
        <div class="days" id="daysCount">1</div>
        <div class="days-unit">天</div>
        <div class="date-info">
            <div class="date-solar" id="solarDate"></div>
            <div class="date-lunar" id="lunarDate"></div>
        </div>
        <div class="date-range" id="dateRange"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js"></script>
    <script>
    const startDate = new Date('2026-02-10T00:00:00');
    
    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return y + '.' + m + '.' + d;
    }
    
    function update() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
        
        document.getElementById('daysCount').textContent = days;
        
        const weekDays = ['日','一','二','三','四','五','六'];
        const solarStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + weekDays[now.getDay()];
        document.getElementById('solarDate').textContent = solarStr;
        
        if (typeof Solar !== 'undefined') {
            const solar = Solar.fromDate(now);
            const lunar = solar.getLunar();
            const monthInChinese = lunar.getMonthInChinese();
            const dayInChinese = lunar.getDayInChinese();
            const lunarStr = '农历' + monthInChinese + '月' + dayInChinese;
            document.getElementById('lunarDate').textContent = lunarStr;
        } else {
            document.getElementById('lunarDate').textContent = '农历加载中...';
        }
        
        document.getElementById('dateRange').textContent = '2026.02.10 - ' + formatDate(now);
    }
    
    update();
    setInterval(update, 1000);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?t=' + Date.now());
    }
    </script>
</body>
</html>
