<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="刘静霖">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>刘静霖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0f0f23 0%, #1a1a3e 40%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 420px;
            width: 90%;
        }
        .name {
            font-size: 42px;
            font-weight: 600;
            letter-spacing: 12px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .growth { font-size: 20px; color: rgba(255,255,255,0.6); margin-bottom: 8px; letter-spacing: 2px; }
        .days {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #64ffda 0%, #00e5ff 50%, #18ffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(100, 255, 218, 0.3);
        }
        .days-unit { font-size: 28px; color: #64ffda; margin-bottom: 45px; letter-spacing: 4px; }
        .date-info { padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); }
        .date-solar { font-size: 18px; color: rgba(255,255,255,0.8); margin-bottom: 10px; letter-spacing: 1px; }
        .date-lunar { font-size: 16px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
        .date-range { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 20px; letter-spacing: 1px; }
        @media (max-width: 400px) {
            .card { padding: 40px 30px; }
            .name { font-size: 32px; letter-spacing: 8px; }
            .days { font-size: 90px; }
            .days-unit { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="name">刘静霖</div>
        <div class="growth">成长</div>
        <div class="days" id="daysCount">1</div>
        <div class="days-unit">天</div>
        <div class="date-info">
            <div class="date-solar" id="solarDate"></div>
            <div class="date-lunar" id="lunarDate"></div>
        </div>
        <div class="date-range" id="dateRange"></div>
    </div>
    
    <script>
    var startDate = new Date('2026-02-10T00:00:00');

    // 农历数据 1900-2100（完整权威版，不依赖任何外部库）
    var lunarInfo = [
        0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
        0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
        0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
        0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
        0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
        0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052d0,0x0a9a8,0x0e950,0x06aa0,
        0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
        0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b5a0,0x195a6,
        0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
        0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,
        0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
        0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
        0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
        0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
        0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,
        0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06b20,0x1a6c4,0x0aae0,
        0x092e0,0x0d2e3,0x0c960,0x0d557,0x0d4a0,0x0da50,0x05d55,0x056a0,0x0a6d0,0x055d4,
        0x052d0,0x0a9b8,0x0a950,0x0b4a0,0x0b6a6,0x0ad50,0x055a0,0x0aba4,0x0a5b0,0x052b0,
        0x0b273,0x06930,0x07337,0x06aa0,0x0ad50,0x14b55,0x04b60,0x0a570,0x054e4,0x0d160,
        0x0e968,0x0d520,0x0daa0,0x16aa6,0x056d0,0x04ae0,0x0a9d4,0x0a4d0,0x0d150,0x0f252,
        0x0d520
    ];

    var lunarMonthNames = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
    var lunarDayNames = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
                         '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
                         '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

    function lYearDays(y) {
        var i, sum = 348;
        for (i = 0x8000; i > 0x8; i >>= 1) {
            sum += (lunarInfo[y - 1900] & i) ? 1 : 0;
        }
        return sum + leapDays(y);
    }

    function leapDays(y) {
        if (leapMonth(y)) {
            return (lunarInfo[y - 1900] & 0x10000) ? 30 : 29;
        }
        return 0;
    }

    function leapMonth(y) {
        return lunarInfo[y - 1900] & 0xf;
    }

    function monthDays(y, m) {
        return (lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29;
    }

    function solar2lunar(y, m, d) {
        if (y < 1900 || y > 2100) return null;

        var baseDate = new Date(1900, 0, 31);
        var targetDate = new Date(y, m - 1, d);
        var offset = Math.floor((targetDate - baseDate) / 86400000);

        var i, temp = 0;
        for (i = 1900; i < 2101 && offset > 0; i++) {
            temp = lYearDays(i);
            offset -= temp;
        }
        if (offset < 0) { offset += temp; i--; }

        var year = i;
        var leap = leapMonth(i);
        var isLeap = false;

        for (i = 1; i < 13 && offset > 0; i++) {
            if (leap > 0 && i === (leap + 1) && !isLeap) {
                --i;
                isLeap = true;
                temp = leapDays(year);
            } else {
                temp = monthDays(year, i);
            }
            if (isLeap && i === (leap + 1)) isLeap = false;
            offset -= temp;
        }

        if (offset === 0 && leap > 0 && i === leap + 1) {
            if (isLeap) { isLeap = false; } else { isLeap = true; --i; }
        }
        if (offset < 0) { offset += temp; --i; }

        var month = i;
        var day = offset + 1;

        return { month: month, day: day, isLeap: isLeap };
    }

    function formatDate(date) {
        var y = date.getFullYear();
        var m = String(date.getMonth() + 1).padStart(2, '0');
        var d = String(date.getDate()).padStart(2, '0');
        return y + '.' + m + '.' + d;
    }

    function update() {
        var now = new Date();
        var diff = now - startDate;
        var days = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;

        document.getElementById('daysCount').textContent = days;

        var weekDays = ['日','一','二','三','四','五','六'];
        var solarStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + weekDays[now.getDay()];
        document.getElementById('solarDate').textContent = solarStr;

        var lunar = solar2lunar(now.getFullYear(), now.getMonth()+1, now.getDate());
        if (lunar) {
            var lunarStr = '农历';
            if (lunar.isLeap) lunarStr += '闰';
            lunarStr += lunarMonthNames[lunar.month - 1] + '月' + lunarDayNames[lunar.day - 1];
            document.getElementById('lunarDate').textContent = lunarStr;
        }

        document.getElementById('dateRange').textContent = '2026.02.10 - ' + formatDate(now);
    }

    update();
    setInterval(update, 1000);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    </script>
</body>
</html>
