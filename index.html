<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="刘静霖">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>刘静霖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0f0f23 0%, #1a1a3e 40%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 420px;
            width: 90%;
        }
        .name {
            font-size: 42px;
            font-weight: 600;
            letter-spacing: 12px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .growth { font-size: 20px; color: rgba(255,255,255,0.6); margin-bottom: 8px; letter-spacing: 2px; }
        .days {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #64ffda 0%, #00e5ff 50%, #18ffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(100, 255, 218, 0.3);
        }
        .days-unit { font-size: 28px; color: #64ffda; margin-bottom: 45px; letter-spacing: 4px; }
        .date-info { padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); }
        .date-solar { font-size: 18px; color: rgba(255,255,255,0.8); margin-bottom: 10px; letter-spacing: 1px; }
        .date-lunar { font-size: 16px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
        .date-range { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 20px; letter-spacing: 1px; }
        @media (max-width: 400px) {
            .card { padding: 40px 30px; }
            .name { font-size: 32px; letter-spacing: 8px; }
            .days { font-size: 90px; }
            .days-unit { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="name">刘静霖</div>
        <div class="growth">成长</div>
        <div class="days" id="daysCount">1</div>
        <div class="days-unit">天</div>
        <div class="date-info">
            <div class="date-solar" id="solarDate"></div>
            <div class="date-lunar" id="lunarDate"></div>
        </div>
        <div class="date-range" id="dateRange"></div>
    </div>
    
    <script>
    const startDate = new Date('2026-02-10T00:00:00');
    
    // 农历数据 (1900-2100) - 修正版
    const lunarInfo = [
        0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
        0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
        0x04970,0x0a4b0,0x0b4b5,0x06a50,0x056d4,0x055d0,0x0d4d0,0x0a5d0,0x095b0,0x14b40,
        0x04b70,0x0b550,0x056a0,0x1a5b0,0x02540,0x0d250,0x0d520,0x0dd50,0x0b540,0x056a0,
        0x155b0,0x05440,0x0aa50,0x0b5a0,0x19520,0x05540,0x0a560,0x095b0,0x14b50,0x04b60,
        0x0a570,0x054a0,0x15550,0x056a0,0x0ad60,0x05550,0x1ab50,0x05b40,0x0a6a0,0x095b0,
        0x155b0,0x04970,0x0a5b0,0x05a50,0x1d5a0,0x05d40,0x0b540,0x0b5a0,0x195a0,0x095b0,
        0x14b50,0x04b70,0x0a570,0x054d0,0x155d0,0x056a0,0x0ad60,0x05550,0x1ab50,0x05b40,
        0x0a6a0,0x095b0,0x155b0,0x04970,0x0a5b0,0x05a50,0x1d5a0,0x05d40,0x0b540,0x0b5a0,
        0x195a0,0x095b0,0x14b50,0x04b70,0x0a570,0x054d0,0x155d0,0x056a0,0x0ad60,0x05550,
        0x1ab50,0x05b40,0x0a6a0,0x095b0,0x155b0,0x04970,0x0a5b0,0x05a50,0x1d5a0,0x05d40,
        0x0b540,0x0b5a0,0x195a0,0x095b0,0x14b50,0x04b70,0x0a570,0x054d0,0x155d0,0x056a0,
        0x0ad60,0x05550,0x1ab50,0x05b40,0x0a6a0,0x095b0,0x155b0,0x04970,0x0a5b0,0x05a50,
        0x1d5a0,0x05d40,0x0b540,0x0b5a0,0x195a0,0x095b0,0x14b50,0x04b70,0x0a570,0x054d0,
        0x155d0,0x056a0,0x0ad60,0x05550,0x1ab50,0x05b40,0x0a6a0,0x095b0,0x155b0,0x04970,
        0x0a5b0,0x05a50,0x1d5a0,0x05d40,0x0b540,0x0b5a0,0x195a0,0x095b0,0x14b50,0x04b70,
        0x0a570,0x054d0,0x155d0,0x056a0,0x0ad60,0x05550,0x1ab50,0x05b40,0x0a6a0,0x095b0,
        0x155b0,0x04970,0x0a5b0,0x05a50,0x1d5a0,0x05d40,0x0b540,0x0b5a0,0x195a0,0x095b0,
        0x14b50,0x04b70,0x0a570,0x054d0,0x155d0,0x056a0,0x0ad60,0x05550,0x1ab50,0x05b40,
        0x0a6a0,0x095b0,0x155b0,0x04970,0x0a5b0,0x05a50,0x1d5a0,0x05d40,0x0b540,0x0b5a0,
        0x195a0,0x095b0,0x14b50,0x04b70,0x0a570,0x054d0,0x155d0,0x056a0,0x0ad60,0x05550,
        0x1ab50,0x05b40,0x0a6a0,0x095b0,0x155b0,0x04970,0x0a5b0,0x05a50,0x1d5a0,0x05d40,
        0x0b540,0x0b5a0,0x195a0,0x095b0,0x14b50,0x04b70,0x0a570,0x054d0,0x155d0,0x056a0,
        0x0ad60,0x05550,0x1ab50,0x05b40,0x0a6a0,0x095b0,0x155b0,0x04970,0x0a5b0,0x05a50
    ];
    
    const lunarMonthNames = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
    const lunarDayNames = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
                          '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
                          '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
    
    function lYearDays(y) {
        let i, sum = 348;
        for(i=0x8000; i>0x8; i>>=1) {
            sum += (lunarInfo[y-1900] & i) ? 1 : 0;
        }
        return sum + leapDays(y);
    }
    
    function leapDays(y) {
        if(leapMonth(y)) {
            return (lunarInfo[y-1900] & 0x10000) ? 30 : 29;
        }
        return 0;
    }
    
    function leapMonth(y) {
        return lunarInfo[y-1900] & 0xf;
    }
    
    function monthDays(y, m) {
        return (lunarInfo[y-1900] & (0x10000 >> m)) ? 30 : 29;
    }
    
    function solar2lunar(y, m, d) {
        if(y < 1900 || y > 2100) return null;
        
        // 基准日期: 1900年1月31日是农历1900年正月初一
        let baseDate = new Date(1900, 0, 31);
        let targetDate = new Date(y, m-1, d);
        let offset = Math.floor((targetDate - baseDate) / 86400000);
        
        let i, temp = 0;
        for(i=1900; i<2101 && offset>0; i++) {
            temp = lYearDays(i);
            offset -= temp;
        }
        if(offset < 0) {
            offset += temp;
            i--;
        }
        
        const year = i;
        const leap = leapMonth(i);
        let isLeap = false;
        
        for(i=1; i<13 && offset>0; i++) {
            if(leap > 0 && i === (leap+1) && !isLeap) {
                --i;
                isLeap = true;
                temp = leapDays(year);
            } else {
                temp = monthDays(year, i);
            }
            
            if(isLeap && i === (leap+1)) isLeap = false;
            offset -= temp;
        }
        
        if(offset === 0 && leap > 0 && i === leap+1) {
            if(isLeap) {
                isLeap = false;
            } else {
                isLeap = true;
                --i;
            }
        }
        if(offset < 0) {
            offset += temp;
            --i;
        }
        
        const month = i;
        const day = offset + 1;
        
        return {
            year: year,
            month: month,
            monthStr: lunarMonthNames[month-1],
            day: day,
            dayStr: lunarDayNames[day-1],
            isLeap: isLeap
        };
    }
    
    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return y + '.' + m + '.' + d;
    }
    
    function update() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
        
        document.getElementById('daysCount').textContent = days;
        
        // 公历
        const weekDays = ['日','一','二','三','四','五','六'];
        const solarStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + weekDays[now.getDay()];
        document.getElementById('solarDate').textContent = solarStr;
        
        // 农历 - 修正计算
        const lunar = solar2lunar(now.getFullYear(), now.getMonth()+1, now.getDate());
        let lunarStr = '农历';
        if(lunar) {
            if(lunar.isLeap) lunarStr += '闰';
            lunarStr += lunar.monthStr + '月' + lunar.dayStr;
        }
        document.getElementById('lunarDate').textContent = lunarStr;
        
        // 日期范围
        document.getElementById('dateRange').textContent = '2026.02.10 - ' + formatDate(now);
    }
    
    update();
    setInterval(update, 1000);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    </script>
</body>
</html>
